<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Screen Stream</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #1a1a1a;
        color: white;
        font-family: sans-serif;
        min-height: 100vh;
      }
      #status {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 5px 10px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 4px;
        font-size: 12px;
        z-index: 10;
      }
      #fps {
        position: absolute;
        top: 10px;
        left: 10px;
        padding: 5px 10px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 4px;
        font-size: 14px;
        font-weight: bold;
        z-index: 10;
      }
      .container {
        position: relative;
        width: 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      video,
      canvas {
        max-width: 100%;
        max-height: 100vh;
        object-fit: contain;
      }
      #remoteVideo {
        display: none; /* Only show if worker fails */
      }
    </style>
  </head>
  <body>
    <div id="fps">FPS: 0</div>
    <div id="status">Connecting...</div>
    <div class="container">
      <canvas id="streamCanvas"></canvas>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script>
      const socket = io()
      const video = document.getElementById('remoteVideo')
      const canvas = document.getElementById('streamCanvas')
      const status = document.getElementById('status')
      const fpsEl = document.getElementById('fps')

      let worker = null
      let processor = null
      const candidateQueue = []
      const WEBRTC_BITRATE = 15000 // Match server setting

      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
      })

      /**
       * SDP Munging to increase bitrate
       */
      function mungeSdp(sdp, bitrate) {
        let lines = sdp.split('\r\n')
        const mVideoIndex = lines.findIndex((line) => line.startsWith('m=video'))
        if (mVideoIndex !== -1) {
          lines.splice(mVideoIndex + 1, 0, `b=AS:${bitrate}`)
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('a=fmtp')) {
              lines[i] +=
                `;x-google-min-bitrate=${bitrate};x-google-max-bitrate=${bitrate};x-google-start-bitrate=${bitrate}`
            }
          }
        }
        return lines.join('\r\n')
      }

      pc.ontrack = (event) => {
        console.log('Track received:', event)
        const track = event.track

        // Use detail content hint if possible
        if ('contentHint' in track) {
          track.contentHint = 'detail'
        }

        const canUseWorker =
          'MediaStreamTrackProcessor' in window && typeof canvas.transferControlToOffscreen === 'function'

        if (canUseWorker) {
          console.log('Using Worker + OffscreenCanvas for rendering')
          video.style.display = 'none'
          canvas.style.display = 'block'
          setupWorker(track)
        } else {
          console.log('Falling back to <video> rendering')
          video.style.display = 'block'
          canvas.style.display = 'none'
          if (event.streams && event.streams[0]) {
            video.srcObject = event.streams[0]
          } else {
            const inboundStream = new MediaStream()
            inboundStream.addTrack(track)
            video.srcObject = inboundStream
          }
          setupVideoFpsCounter()
        }
        status.textContent = 'Stream received!'
      }

      function setupVideoFpsCounter() {
        let frameCount = 0
        let lastTime = performance.now()

        const updateFps = (now) => {
          frameCount++
          const delta = now - lastTime
          if (delta >= 1000) {
            const fps = Math.round((frameCount * 1000) / delta)
            fpsEl.textContent = `FPS: ${fps}`
            frameCount = 0
            lastTime = now
          }

          if ('requestVideoFrameCallback' in video) {
            video.requestVideoFrameCallback(updateFps)
          } else {
            requestAnimationFrame(updateFps)
          }
        }

        if ('requestVideoFrameCallback' in video) {
          video.requestVideoFrameCallback(updateFps)
        } else {
          requestAnimationFrame(updateFps)
        }
      }

      function setupWorker(track) {
        if (!worker) {
          worker = new Worker('webrtc-worker.js')
          const offscreen = canvas.transferControlToOffscreen()
          worker.postMessage({ type: 'init', canvas: offscreen }, [offscreen])

          worker.onmessage = (e) => {
            if (e.data.type === 'fps') {
              fpsEl.textContent = `FPS: ${e.data.value}`
            }
          }
        }

        processor = new MediaStreamTrackProcessor({ track })
        const readable = processor.readable
        worker.postMessage({ type: 'stream', readable }, [readable])
      }

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          console.log('Local candidate:', event.candidate.candidate)
          socket.emit('candidate', event.candidate)
        }
      }

      pc.onconnectionstatechange = () => {
        console.log('Connection state:', pc.connectionState)
        status.textContent = `PC: ${pc.connectionState}`
      }

      socket.on('connect', () => {
        console.log('Socket connected')
        status.textContent = 'Socket connected'
      })

      socket.on('offer', async (offer) => {
        console.log('Received offer')
        try {
          // Munge offer SDP
          offer.sdp = mungeSdp(offer.sdp, WEBRTC_BITRATE)
          await pc.setRemoteDescription(offer)

          const answer = await pc.createAnswer()
          // Munge answer SDP
          answer.sdp = mungeSdp(answer.sdp, WEBRTC_BITRATE)
          await pc.setLocalDescription(answer)

          socket.emit('answer', answer)

          // Process queued candidates
          while (candidateQueue.length > 0) {
            const candidate = candidateQueue.shift()
            await pc.addIceCandidate(candidate)
          }
        } catch (e) {
          console.error('Error handling offer:', e)
        }
      })

      socket.on('candidate', async (candidate) => {
        try {
          if (pc.remoteDescription) {
            await pc.addIceCandidate(candidate)
          } else {
            candidateQueue.push(candidate)
          }
        } catch (e) {
          console.error('Error adding ice candidate:', e)
        }
      })

      // Input handling
      function mapKey(key) {
        const map = {
          ArrowUp: 'up',
          ArrowDown: 'down',
          ArrowLeft: 'left',
          ArrowRight: 'right',
          Enter: 'enter',
          Backspace: 'backspace',
          Escape: 'escape',
          Tab: 'tab',
          Control: 'control',
          Shift: 'shift',
          Alt: 'alt',
          Meta: 'command',
        }
        if (map[key]) return map[key]
        if (key.length === 1) return key.toLowerCase()
        return null
      }

      function sendEvent(event, target) {
        if (socket.connected) {
          if (event.x !== undefined && event.y !== undefined && target) {
            const rect = target.getBoundingClientRect()
            let intrinsicWidth = target.tagName === 'VIDEO' ? target.videoWidth : target.width
            let intrinsicHeight = target.tagName === 'VIDEO' ? target.videoHeight : target.height

            // Fallback if dimensions are missing
            if (!intrinsicWidth) intrinsicWidth = rect.width
            if (!intrinsicHeight) intrinsicHeight = rect.height

            const scaleX = intrinsicWidth / rect.width
            const scaleY = intrinsicHeight / rect.height
            event.x = Math.round((event.x - rect.left) * scaleX)
            event.y = Math.round((event.y - rect.top) * scaleY)
          }
          socket.emit('input', event)
        }
      }

      function setupInputListeners(element) {
        element.addEventListener('mousemove', (e) => {
          sendEvent({ type: 'mousemove', x: e.clientX, y: e.clientY }, element)
        })
        element.addEventListener('mousedown', (e) => {
          sendEvent(
            { type: 'mousedown', button: e.button === 0 ? 'left' : e.button === 2 ? 'right' : 'middle' },
            element,
          )
        })
        element.addEventListener('mouseup', (e) => {
          sendEvent({ type: 'mouseup', button: e.button === 0 ? 'left' : e.button === 2 ? 'right' : 'middle' }, element)
        })
        element.addEventListener('dblclick', (e) => {
          sendEvent({ type: 'dblclick', button: 'left' }, element)
        })
        element.addEventListener('contextmenu', (e) => e.preventDefault())
        element.addEventListener(
          'wheel',
          (e) => {
            e.preventDefault()
            sendEvent({ type: 'scroll', deltaX: e.deltaX, deltaY: e.deltaY }, element)
          },
          { passive: false },
        )
      }

      setupInputListeners(canvas)
      setupInputListeners(video)

      window.addEventListener('keydown', (e) => {
        const key = mapKey(e.key)
        if (key) sendEvent({ type: 'keydown', key })
      })

      window.addEventListener('keyup', (e) => {
        const key = mapKey(e.key)
        if (key) sendEvent({ type: 'keyup', key })
      })
    </script>
  </body>
</html>
